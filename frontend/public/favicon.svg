<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="72" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
  </defs>

  <!-- Square background -->
  <rect width="72" height="72" rx="16" fill="url(#bg)"/>

  <!-- Graduation cap board (diamond) -->
  <polygon points="36,15 62,27 36,39 10,27" fill="white"/>

  <!-- Cap body -->
  <rect x="23" y="37" width="26" height="17" rx="4" fill="white" opacity="0.85"/>
  <rect x="23" y="37" width="26" height="5" rx="2" fill="white"/>

  <!-- Tassel string -->
  <line x1="62" y1="27" x2="62" y2="46" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <!-- Tassel ball -->
  <circle cx="62" cy="50" r="4" fill="white" opacity="0.9"/>
</svg>
