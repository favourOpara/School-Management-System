<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" fill="none">
  <defs>
    <linearGradient id="iconGradW" x1="0" y1="0" x2="72" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="shimmerW" x1="0" y1="0" x2="0" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Icon background -->
  <rect x="0" y="4" width="72" height="72" rx="16" fill="url(#iconGradW)"/>
  <!-- Subtle top shine -->
  <rect x="0" y="4" width="72" height="36" rx="16" fill="url(#shimmerW)"/>

  <!-- Graduation cap: flat board (diamond) -->
  <polygon points="36,19 62,31 36,43 10,31" fill="white"/>

  <!-- Cap body -->
  <rect x="23" y="41" width="26" height="17" rx="4" fill="white" opacity="0.82"/>
  <!-- Cap body top rim -->
  <rect x="23" y="41" width="26" height="5" rx="2" fill="white"/>

  <!-- Tassel string -->
  <line x1="62" y1="31" x2="62" y2="50" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <!-- Tassel end ball -->
  <circle cx="62" cy="54" r="4" fill="white" opacity="0.9"/>

  <!-- Wordmark — white for dark backgrounds -->
  <text
    x="88" y="46"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
    font-size="32"
    font-weight="800"
    letter-spacing="-0.5"
  >
    <tspan fill="#ffffff">Edu</tspan><tspan fill="#93c5fd">Care</tspan>
  </text>

  <!-- Tagline -->
  <text
    x="91" y="63"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
    font-size="9.5"
    font-weight="600"
    fill="rgba(255,255,255,0.55)"
    letter-spacing="3.2"
  >SCHOOL MANAGEMENT</text>
</svg>
